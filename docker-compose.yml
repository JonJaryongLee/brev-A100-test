services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    runtime: nvidia
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN}
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - "cyankiwi/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit"
      - "--max-model-len"
      - "32768"
      - "--gpu-memory-utilization"
      - "0.95"
      - "--trust-remote-code"

